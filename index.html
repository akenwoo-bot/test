            resultDiv.classList.add('success');
            resultDiv.innerHTML = `
                <div>查詢成功！<strong>${student.name} (${student.id})</strong> 的密碼為：</div>
                <div class="password-display">${student.password}</div>
            `;
        } else {
            resultDiv.style.display = 'block';
            resultDiv.classList.add('error');
            resultDiv.innerHTML = '找不到該學生資料，請檢查輸入是否正確。';
        }
    }

    // 支援按下 Enter 鍵直接查詢
    document.getElementById('searchKey').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            searchPassword();
        }
    });
</script>

</body>
</html>
